name: Update README

on:
  push:
    branches:
      - main
    paths:
      - 'pending/**'
      - 'upstreamed/**'
      - 'reproducers/**'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate README
        run: |
          cat <<EOF > README.md
          # linux-lib-patchwork

          Patch collection and reproduction scripts for the Linux kernel \`lib/\` directory.

          ## Layout

          - \`pending/\`: Patches currently under review or development.
          - \`upstreamed/\`: Patches accepted into a parent tree.
          - \`reproducers/\`: Scripts and logs for verifying bugs.

          ## Current Patches

          ### Pending
          EOF

          if [ -d "pending" ] && [ "$(ls -A pending/*.patch 2>/dev/null)" ]; then
            for f in pending/*.patch; do
              desc=$(grep -m 1 "Subject:" "$f" | sed 's/Subject: \[PATCH.*\] //; s/Subject: //; s/^[[:space:]]*//; s/[[:space:]]*$//')
              echo "- \`$(basename "$f")\`: $desc" >> README.md
            done
          else
            echo "_No pending patches._" >> README.md
          fi

          echo "" >> README.md
          echo "### Upstreamed" >> README.md
          if [ -d "upstreamed" ] && [ "$(ls -A upstreamed/*.patch 2>/dev/null)" ]; then
            for f in upstreamed/*.patch; do
              desc=$(grep -m 1 "Subject:" "$f" | sed 's/Subject: \[PATCH.*\] //; s/Subject: //; s/^[[:space:]]*//; s/[[:space:]]*$//')
              echo "- \`$(basename "$f")\`: $desc" >> README.md
            done
          else
            echo "_No upstreamed patches._" >> README.md
          fi

          echo "" >> README.md
          echo "## Reproducers" >> README.md
          if [ -d "reproducers" ] && [ "$(ls -A reproducers/ 2>/dev/null)" ]; then
            for f in reproducers/*; do
              [ -f "$f" ] && echo "- \`$(basename "$f")\`" >> README.md
            done
          else
            echo "_No reproducers._" >> README.md
          fi

      - name: Commit and push changes
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          # Todo: add pull logic instead of it just breaking 
        run: |
          git config --global user.name "Josh Law"
          git config --global user.email "joshlaw48@gmail.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -s -m "docs: update README manifest"
            git remote set-url origin "https://techyguyperplexable:${MIRROR_TOKEN}@github.com/glasskernel/linux-lib-patchwork.git"
            git push origin main --force
            git remote add personal "https://techyguyperplexable:${MIRROR_TOKEN}@github.com/techyguyperplexable/linux-lib-patchwork.git"
            git push personal main --force
          fi
